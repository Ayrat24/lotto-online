services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniapp-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LocalDebug__Enabled: "false"
      # Use double-underscore for nested config (maps to Database:ConnectionString)
      Database__ConnectionString: Host=db;Port=5432;Database=${POSTGRES_DB:-miniapp};Username=${POSTGRES_USER:-miniapp};Password=${POSTGRES_PASSWORD}
      Database__AutoMigrate: "true"

      # Telegram/bot config (set these via .env on server!)
      BotMode: "Webhook"
      BotToken: ${BOT_TOKEN}
      BotWebAppUrl: ${BOT_WEBAPP_URL}

      # Admin panel credentials (set via .env on server!)
      Admin__Username: ${ADMIN_USERNAME}
      Admin__Password: ${ADMIN_PASSWORD}

      # Payments / BTCPay config (set these via .env on server!)
      Payments__Enabled: ${PAYMENTS_ENABLED:-false}
      Payments__BtcPay__BaseUrl: ${BTCPAY_BASE_URL}
      Payments__BtcPay__StoreId: ${BTCPAY_STORE_ID}
      Payments__BtcPay__ApiKey: ${BTCPAY_API_KEY}

    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    container_name: miniapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-miniapp}
      POSTGRES_USER: ${POSTGRES_USER:-miniapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - miniapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miniapp} -d ${POSTGRES_DB:-miniapp}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  miniapp_pgdata:
