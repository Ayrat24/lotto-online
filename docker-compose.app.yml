services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniapp-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Use double-underscore for nested config (maps to Database:ConnectionString)
      Database__ConnectionString: Host=db;Port=5432;Database=miniapp;Username=miniapp;Password=miniapp
      Database__AutoMigrate: "true"

      # Telegram/bot config (set these via .env on server!)
      BotMode: "Webhook"
      BotToken: ${BOT_TOKEN}
      BotWebAppUrl: ${BOT_WEBAPP_URL}

      # Admin panel credentials (set via .env on server!)
      Admin__Username: ${ADMIN_USERNAME:-admin}
      Admin__Password: ${ADMIN_PASSWORD}

    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    container_name: miniapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: miniapp
      POSTGRES_USER: miniapp
      POSTGRES_PASSWORD: miniapp
    ports:
      - "5432:5432"
    volumes:
      - miniapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniapp -d miniapp"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  miniapp_pgdata:

